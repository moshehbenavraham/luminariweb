name: deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and dispatch deployment webhook
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
      DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
      DEPLOY_REF: ${{ inputs.ref }}
      DEPLOY_REPOSITORY: ${{ github.repository }}
      DEPLOY_SHA: ${{ github.sha }}
      DEPLOY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      DEPLOY_ROLLBACK_HINT: Redeploy the previous approved revision or release artifact.

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build

      - name: Dispatch deployment webhook
        run: node scripts/deploy-webhook.mjs
